ollama:
  url: http://host.docker.internal:11434
  model: llama3.1:8b
  enabled: false

gemini:
  model: gemini-3-flash-preview
  enabled: true

pexels:
  # photo -> /v1/search (photos); video -> /v1/videos/search
  # media: photo
  media: video
  video_orientation: portrait
  # optional: large | medium | small
  video_size: ""
  video_per_page: 3

paths:
  output_dir: output
  # empty: ~/.cache/autovideo/images
  image_cache_dir: ""

# Nhạc nền: nối các file trong bgm_dir theo tên; lặp lại playlist nếu ngắn hơn lời thoại.
audio:
  bgm_enabled: true
  bgm_dir: asset/songs
  # Hệ số âm lượng nhạc nền khi trộn với TTS (0–1, có thể >1 nếu cần to hơn)
  bgm_volume: 0.18

micro_story:
  json_file_name: micro_story.json

image:
  provider: pexels_unsplash

tts:
  enabled: true
  default:
    voice: vi-VN-HoaiMyNeural
    silent_duration: 3.0
    max_chunk_chars: 2400
    max_retries: 3
    min_valid_tts_output_bytes: 1000
    min_part_bytes: 200
  elevenlabs:
    enabled: false
    voice_id: JBFqnCBsd6RMkjVDRZzb
    model_id_primary: eleven_v3
    model_id_secondary: eleven_turbo_v2_5
    output_format: mp3_44100_128

youtube:
  upload: true
  oauth_local_server_port: 8080
  google_client_secret_path: ./asset/client_secret_340209588068-vd6h9fognutvhth1ltumi08tbi8gbe2d.apps.googleusercontent.com.json
  channel_id: ""
  title_prefix: "Định Luật Murphy"
